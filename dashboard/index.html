<!doctype html>
<html lang="es" class="dark antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dashboard personal de Finanzas Mayeson para controlar caja, presupuesto, deudas, fijos, inversiones y alertas financieras." />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script>
      (() => {
        const stored = window.localStorage.getItem('finanzas_theme');
        const theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>
    <title>Finanzas Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
